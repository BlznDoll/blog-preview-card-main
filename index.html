<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Basic&family=Figtree:ital,wght@0,300..900;1,300..900&family=Metal+Mania&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
   <main class="page">
    <section class="card">
      <img class="hero" src="./assets/images/illustration-article.svg" alt="Abstract blog illustration">

      <p class="tag">Learning</p>
      <p class="date">Published 21 Dec 2023</p>

      <h1>HTML & CSS foundations</h1>

      <p class="description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <div class="author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper">
        <strong>Greg Hooper</strong>
      </div>
    </section>
  </main>
  
  <footer class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.</p> 
    <p>Coded by <a href="https://www.frontendmentor.io/profile/BlznDoll">BlznDoll</a>.</p>
  </footer>
</body>
</html>
